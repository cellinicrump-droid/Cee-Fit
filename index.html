<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>IRON LOG</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#0d0d0d;
  --panel:#161616;
  --panel-raised:#1d1d1d;
  --line:#2a2a2a;
  --ink:#f2f0ea;
  --ink-dim:#8a8780;
  --push:#e8543c;
  --pull:#3ca7e8;
  --legs:#e8c53c;
  --cardio:#3ce8a0;
  --full:#b93ce8;
  --rest:#555;
  --gold:#d4af6a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior-y:none;}
body{padding-bottom:env(safe-area-inset-bottom);}
.topbar{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,#0d0d0d 80%,rgba(13,13,13,0));
  padding:calc(env(safe-area-inset-top) + 18px) 20px 10px;
}
.topbar h1{
  font-family:Georgia,'Times New Roman',serif;
  font-size:28px; font-weight:700; letter-spacing:0.5px; margin:0;
  font-style:italic;
}
.topbar .sub{font-size:12px;color:var(--ink-dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

.daytabs{
  display:flex; gap:6px; overflow-x:auto; padding:14px 20px 6px;
  scrollbar-width:none;
}
.daytabs::-webkit-scrollbar{display:none;}
.daytab{
  flex:0 0 auto; padding:9px 14px; border-radius:20px; font-size:13px; font-weight:600;
  border:1px solid var(--line); background:var(--panel); color:var(--ink-dim);
  white-space:nowrap; transition:all .15s ease;
}
.daytab.active{color:#0d0d0d; border-color:transparent;}
.daytab[data-color="push"].active{background:var(--push);}
.daytab[data-color="pull"].active{background:var(--pull);}
.daytab[data-color="legs"].active{background:var(--legs);}
.daytab[data-color="cardio"].active{background:var(--cardio);}
.daytab[data-color="full"].active{background:var(--full);}
.daytab[data-color="rest"].active{background:var(--rest); color:var(--ink);}

.dayhead{padding:18px 20px 4px;}
.dayhead .label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-dim);}
.dayhead h2{margin:2px 0 0; font-size:22px; font-family:Georgia,serif; font-style:italic;}
.dayhead .venue{font-size:12px;color:var(--gold);margin-top:4px;}

.progress-wrap{padding:14px 20px 4px;}
.progress-track{height:6px;background:var(--panel);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .3s ease;background:var(--gold);}
.progress-label{font-size:11px;color:var(--ink-dim);margin-top:6px;text-align:right;}

.exlist{padding:12px 20px 40px; display:flex; flex-direction:column; gap:10px;}
.exercise{
  background:var(--panel); border:1px solid var(--line); border-radius:14px;
  padding:14px 16px; transition:opacity .2s ease;
}
.exercise.done{opacity:0.45;}
.ex-top{display:flex; align-items:flex-start; gap:12px;}
.checkbox{
  width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
  flex:0 0 24px; display:flex; align-items:center; justify-content:center;
  font-size:14px; margin-top:2px; background:var(--panel-raised);
}
.checkbox.checked{background:var(--gold); border-color:var(--gold); color:#0d0d0d;}
.ex-name{font-size:15px; font-weight:600; line-height:1.3;}
.ex-meta{font-size:12.5px; color:var(--ink-dim); margin-top:3px;}
.ex-controls{
  display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px;
  border-top:1px solid var(--line);
}
.weight-field{
  display:flex; align-items:center; background:var(--panel-raised); border-radius:9px;
  border:1px solid var(--line); overflow:hidden;
}
.weight-field button{
  background:none;border:none;color:var(--ink-dim);font-size:17px;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
}
.weight-field button:active{color:var(--gold);}
.weight-field input{
  width:52px; text-align:center; background:none; border:none; color:var(--ink);
  font-size:15px; font-weight:700; font-family:inherit;
}
.weight-field .unit{font-size:11px;color:var(--ink-dim);padding-right:10px;}
.notes-field{
  flex:1; background:none; border:none; color:var(--ink-dim); font-size:12.5px;
  font-family:inherit; text-align:right;
}
.notes-field:focus{color:var(--ink); outline:none;}

.rest-card{
  margin:20px; padding:40px 20px; text-align:center; background:var(--panel);
  border-radius:16px; border:1px solid var(--line);
}
.rest-card .big{font-size:15px; color:var(--ink-dim); line-height:1.6;}

.install-banner{
  margin:16px 20px; padding:14px 16px; background:var(--panel-raised);
  border:1px solid var(--gold); border-radius:12px; font-size:12.5px; color:var(--ink-dim);
  display:none;
}
.install-banner.show{display:block;}
.install-banner b{color:var(--gold);}
.install-banner .close{float:right; color:var(--ink-dim); font-size:16px; margin-left:8px;}

.resetbar{padding:0 20px 30px; text-align:center;}
.resetbtn{
  background:none; border:1px solid var(--line); color:var(--ink-dim);
  font-size:12px; padding:8px 16px; border-radius:20px;
}
</style>
</head>
<body>

<div class="topbar">
  <h1>Iron Log</h1>
  <div class="sub">Cee &middot; 5-Day Split</div>
</div>

<div id="installBanner" class="install-banner">
  <span class="close" onclick="dismissBanner()">&times;</span>
  <b>Add to Home Screen</b><br>
  Tap the Share icon in Safari, then "Add to Home Screen" — opens like a real app, no browser bars.
</div>

<div class="daytabs" id="daytabs"></div>
<div class="dayhead" id="dayhead"></div>
<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 0 done</div>
</div>
<div class="exlist" id="exlist"></div>

<div class="resetbar"><button class="resetbtn" onclick="resetToday()">Reset today's checkmarks</button></div>

<script>
const PROGRAM = {
  mon: {
    label:"Day 1 · Monday", title:"Upper Push + Biceps", color:"push", venue:"",
    exercises:[
      {name:"Barbell Bench Press", meta:"4 sets × 6-8 reps", weightUnit:"lb"},
      {name:"Seated Dumbbell Shoulder Press", meta:"3 sets × 8-10 reps", weightUnit:"lb"},
      {name:"Incline Dumbbell Press", meta:"3 sets × 10 reps", weightUnit:"lb"},
      {name:"Cable Lateral Raise", meta:"3 sets × 12-15 reps", weightUnit:"lb"},
      {name:"Overhead Triceps Extension", meta:"3 sets × 12 reps", weightUnit:"lb"},
      {name:"Triceps Rope Pushdown", meta:"3 sets × 12-15 reps", weightUnit:"lb"},
      {name:"Barbell or EZ-Bar Curl", meta:"3 sets × 10 reps", weightUnit:"lb"},
      {name:"Incline Dumbbell Curl", meta:"3 sets × 10-12 reps", weightUnit:"lb"},
      {name:"Hammer Curl", meta:"2 sets × 12 reps", weightUnit:"lb"}
    ]
  },
  tue: {
    label:"Day 2 · Tuesday", title:"Yoga", color:"cardio", venue:"Gold's Gym — Yoga Class",
    exercises:[
      {name:"Yoga Class", meta:"Full session — mobility & nervous system reset", weightUnit:null},
      {name:"Post-Class Stretch / Breathwork", meta:"10 min, optional", weightUnit:null}
    ]
  },
  wed: {
    label:"Day 3 · Wednesday", title:"Legs + Back", color:"legs", venue:"",
    exercises:[
      {name:"Back Squat", meta:"4 sets × 6 reps", weightUnit:"lb"},
      {name:"Romanian Deadlift", meta:"4 sets × 10 reps", weightUnit:"lb"},
      {name:"Leg Press", meta:"4 sets × 12 reps", weightUnit:"lb"},
      {name:"Walking Lunges", meta:"3 sets × 12 steps/leg", weightUnit:"lb"},
      {name:"Leg Curl (Machine)", meta:"3 sets × 12 reps", weightUnit:"lb"},
      {name:"Standing Calf Raise", meta:"4 sets × 15 reps", weightUnit:"lb"},
      {name:"Barbell Bent-Over Row", meta:"4 sets × 8 reps", weightUnit:"lb"},
      {name:"Lat Pulldown", meta:"3 sets × 10-12 reps", weightUnit:"lb"},
      {name:"Seated Cable Row", meta:"3 sets × 10-12 reps", weightUnit:"lb"}
    ]
  },
  thu: {
    label:"Day 4 · Thursday", title:"Kickboxing + Yoga", color:"cardio", venue:"Gold's Gym — Kickboxing → Yoga",
    exercises:[
      {name:"Kickboxing Class", meta:"Full session — cardio & power", weightUnit:null},
      {name:"Yoga Class", meta:"Follows kickboxing — recovery stretch", weightUnit:null}
    ]
  },
  fri: {
    label:"Day 5 · Friday", title:"Full Body Compound", color:"full", venue:"Under 60 minutes",
    exercises:[
      {name:"Barbell Bench Press", meta:"4 sets × 5 reps", weightUnit:"lb"},
      {name:"Back Squat", meta:"4 sets × 5 reps", weightUnit:"lb"},
      {name:"Deadlift", meta:"3 sets × 5 reps", weightUnit:"lb"},
      {name:"Standing Overhead Press", meta:"3 sets × 6-8 reps", weightUnit:"lb"},
      {name:"Clean & Jerk", meta:"5 sets × 3 reps", weightUnit:"lb"},
      {name:"Curl + Triceps Superset", meta:"3 rounds × 10/10", weightUnit:"lb"},
      {name:"Ab Finisher Circuit", meta:"3 rounds — hanging leg raise, plank, cable crunch", weightUnit:null}
    ]
  },
  sat: {label:"Rest", title:"Rest Day", color:"rest", venue:"", exercises:null},
  sun: {label:"Rest", title:"Rest Day", color:"rest", venue:"", exercises:null}
};

const DAY_ORDER = ["mon","tue","wed","thu","fri","sat","sun"];
let currentDay = (function(){
  const jsDay = new Date().getDay(); // 0=Sun
  const map = ["sun","mon","tue","wed","thu","fri","sat"];
  return map[jsDay];
})();

let store = JSON.parse(localStorage.getItem('ironlog_v1') || '{}');
// store shape: { weights:{exKey:val}, checks:{ 'YYYY-MM-DD_exKey': true }, notes:{exKey:str} }
store.weights = store.weights || {};
store.notes = store.notes || {};
store.checks = store.checks || {};

function save(){ localStorage.setItem('ironlog_v1', JSON.stringify(store)); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function exKey(day,i){ return day+"_"+i; }

function renderTabs(){
  const wrap = document.getElementById('daytabs');
  wrap.innerHTML = '';
  DAY_ORDER.forEach(d=>{
    const btn = document.createElement('button');
    btn.className = 'daytab' + (d===currentDay ? ' active':'');
    btn.dataset.color = PROGRAM[d].color;
    btn.textContent = PROGRAM[d].label.split('·')[1] ? PROGRAM[d].label.split('·')[1].trim().slice(0,3) : PROGRAM[d].label.slice(0,3);
    btn.onclick = ()=>{ currentDay = d; renderAll(); };
    wrap.appendChild(btn);
  });
}

function renderHead(){
  const day = PROGRAM[currentDay];
  const head = document.getElementById('dayhead');
  head.innerHTML = `
    <div class="label">${day.label}</div>
    <h2>${day.title}</h2>
    ${day.venue ? `<div class="venue">${day.venue}</div>` : ''}
  `;
}

function renderExercises(){
  const day = PROGRAM[currentDay];
  const list = document.getElementById('exlist');
  list.innerHTML = '';

  if(!day.exercises){
    list.innerHTML = `<div class="rest-card"><div class="big">Rest day.<br>Recovery is part of the program — let the tissue rebuild.</div></div>`;
    document.getElementById('progressLabel').textContent = '';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }

  const tKey = todayStr();
  let doneCount = 0;

  day.exercises.forEach((ex,i)=>{
    const key = exKey(currentDay,i);
    const checkKey = tKey+'_'+key;
    const isChecked = !!store.checks[checkKey];
    if(isChecked) doneCount++;

    const card = document.createElement('div');
    card.className = 'exercise' + (isChecked ? ' done':'');

    const weightVal = store.weights[key] !== undefined ? store.weights[key] : '';
    const noteVal = store.notes[key] || '';

    card.innerHTML = `
      <div class="ex-top">
        <div class="checkbox ${isChecked?'checked':''}" data-checkkey="${checkKey}">${isChecked?'&#10003;':''}</div>
        <div style="flex:1">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.meta}</div>
        </div>
      </div>
      ${ex.weightUnit ? `
      <div class="ex-controls">
        <div class="weight-field">
          <button data-act="dec" data-key="${key}">–</button>
          <input type="number" inputmode="decimal" data-key="${key}" value="${weightVal}" placeholder="0">
          <div class="unit">${ex.weightUnit}</div>
        </div>
        <input class="notes-field" data-notekey="${key}" placeholder="note..." value="${noteVal}">
      </div>` : ''}
    `;
    list.appendChild(card);
  });

  document.getElementById('progressLabel').textContent = `${doneCount} / ${day.exercises.length} done`;
  document.getElementById('progressFill').style.width = (doneCount/day.exercises.length*100)+'%';

  // wire checkboxes
  list.querySelectorAll('.checkbox').forEach(cb=>{
    cb.onclick = ()=>{
      const ck = cb.dataset.checkkey;
      store.checks[ck] = !store.checks[ck];
      save();
      renderExercises();
    };
  });

  // wire weight inputs
  list.querySelectorAll('.weight-field input').forEach(inp=>{
    inp.onchange = ()=>{
      store.weights[inp.dataset.key] = inp.value;
      save();
    };
  });

  // wire +/- buttons
  list.querySelectorAll('.weight-field button').forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.key;
      const input = list.querySelector(`input[type="number"][data-key="${key}"]`);
      let val = parseFloat(input.value) || 0;
      val = btn.dataset.act === 'inc' ? val + 5 : Math.max(0, val - 5);
      input.value = val;
      store.weights[key] = val;
      save();
    };
  });

  // wire notes
  list.querySelectorAll('.notes-field').forEach(inp=>{
    inp.onchange = ()=>{
      store.notes[inp.dataset.notekey] = inp.value;
      save();
    };
  });
}

function resetToday(){
  const tKey = todayStr();
  Object.keys(store.checks).forEach(k=>{
    if(k.startsWith(tKey)) delete store.checks[k];
  });
  save();
  renderExercises();
}

function renderAll(){
  renderTabs();
  renderHead();
  renderExercises();
}

function dismissBanner(){
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('ironlog_banner_dismissed','1');
}

// show install banner on iOS Safari only, if not already installed/dismissed
(function(){
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  const dismissed = localStorage.getItem('ironlog_banner_dismissed');
  if(isIOS && !isStandalone && !dismissed){
    document.getElementById('installBanner').classList.add('show');
  }
})();

renderAll();
</script>
</body>
</html>
